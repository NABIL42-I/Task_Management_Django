<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> Welcome home </h1>
    {% if user.is_authenticated %}
    <h3>{{user}}</h3>
    <form action="{% url "sign_out" %}" method="POST">
      {% csrf_token %}
        <button type="submit">Logout</button>
    </form>
    {% else %} 
    <h3>Annonymous</h3>
    {% endif %}


</body>
</html>
