

{% extends "Dashboard/dashboard.html" %}

{% block title %}     
   <title>User</title>
{% endblock title %}


{% block user %}

<footer class="bg-grey-500 py-6 shadow mt-10 mx-10">

  <div class="max-w-md mx-auto bg-white p-5 rounded-xl shadow-md">

  <!-- Title -->
  <h2 class="text-lg font-semibold mb-4">Leave a Comment</h2>

  <!-- Name Input -->
  <input
    type="text"
    placeholder="Your name"
    class="w-full mb-3 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
  />

  <!-- Comment Textarea -->
  <textarea
    rows="4"
    placeholder="Write your comment..."
    class="w-full mb-3 px-4 py-2 border rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-400"
  ></textarea>

  <!-- Button -->
  <button class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
    Post Comment
  </button>

</div>

</footer>
{% endblock user %}


{% block name %}User Profile{% endblock name %}
